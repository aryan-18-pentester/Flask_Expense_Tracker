{% extends "dashboard_base.html" %}
{% block title %}Dashboard{% endblock %}
{% block title_text %}Dashboard{% endblock %}

{% block content %}

    <div class="stats-row">
 
    <div class="stat-card">
        <p class="stat-label">Total Entries</p>
        <p class="stat-value">{{ total_count }}</p>
    </div>
 
    <div class="stat-card">
        <p class="stat-label">Total Sum</p>
        <p class="stat-value">{{ total_sum }}</p>
    </div>
 
    <div class="stat-card">
        <p class="stat-label">Average</p>
        <p class="stat-value">{{ average }}</p>
    </div>
 
    <div class="stat-card">
        <p class="stat-label">Highest</p>
        <p class="stat-value">{{ highest }}</p>
    </div>
 
    <div class="stat-card">
        <p class="stat-label">Lowest</p>
        <p class="stat-value">{{ lowest }}</p>
    </div>
 
</div>

{% endblock %}
