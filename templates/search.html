<!DOCTYPE html>
<html>
<head>
    <title>Search</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        .search-form { margin-bottom: 2rem; padding: 1rem; border: 1px solid #ccc; border-radius: 8px; }
        .search-form label { display: inline-block; width: 120px; }
        .search-form input { margin-bottom: 0.5rem; padding: 4px; width: 200px; }
        .search-form button { padding: 6px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
        .no-results { color: #888; }
    </style>
</head>
<body>
    <h1>Search Records</h1>

    <!-- Search Form -->
    <div class="search-form">
        <form action="{{ url_for('search') }}" method="GET">
            <div>  
                <label for="amount">Amount</label>
                <input type="number" name="amount" id="numeric" value="{{ amount or '' }}">
            </div>
            <div>
                <label for="category">Category</label>
                <input type="text" name="category" id="string1" value="{{ category or '' }}">
            </div>
            <div>
                <label for="description">Description</label>
                <input type="text" name="description" id="string2" value="{{ description or '' }}">
            </div>
            <button type="submit">Search</button>
    </div>
    <!-- ===== NEW FILTER CONTROLS (add these) ===== -->
    <div>
        <label>Amount range:</label>
        <input type="number" name="price_min" placeholder="Min" value="{{ price_min or '' }}">
        <input type="number" name="price_max" placeholder="Max" value="{{ price_max or '' }}">
    </div>

<select name="category_filter">
    <option value="">All</option>

    {% for category in categories %}
        <option value="{{ category }}"
            {% if category_filter == category %}selected{% endif %}>
            {{ category }}
        </option>
    {% endfor %}
</select>

    <button type="submit">Apply Filters</button>
    <a href="{{ url_for('search') }}">Clear</a>
</form>

<!-- Your results table stays unchanged -->

    <!-- Results -->
    <h2>Results ({{ results|length }})</h2>
    {% if results %}
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Category</th>
                <th>Description</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            {% for record in results %}
            <tr>
                <td>{{ record.id }}</td>
                <td>{{ record.category }}</td>
                <td>{{ record.description }}</td>
                <td>${{ record.amount }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p class="no-results">No records match your criteria.</p>
    {% endif %}

    <!-- Optional: link back to home -->
    <p><a href="{{ url_for('dashboard') }}">Back to Home</a></p>
</body>
</html>
