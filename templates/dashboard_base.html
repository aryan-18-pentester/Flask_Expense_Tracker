<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>

    <div class="layout">

        <!-- ── Sidebar ── -->
        <aside class="sidebar">

            <div class="brand">Expense Tracker</div>

            <nav class="nav">
                <!-- active class highlights the current page -->
                <!-- 'active' variable is passed from every route in app.py -->
                <a href="{{ url_for('dashboard') }}"
                   class="nav-link {% if active == 'dashboard' %}active{% endif %}">
                    Dashboard
                </a>
                 
		<a href="{{ url_for('expenses') }}"
                   class="nav-link {% if active == 'expenses' %}active{% endif %}">
                    expenses
                </a>
            </nav>

        </aside>

        <!-- ── Main content area ── -->
        <main class="main">

            <!-- topbar -->
            <div class="topbar">
                <h1 class="page-title">{% block title_text %}Page{% endblock %}</h1>
                <span class="brand">App</span>
            <nav>
              <span class="topbar-user">{{ current_user.username }}</span>
              <a href="{{ url_for('logout') }}">Log out</a>
            </nav>
 
            </div>

            <!-- page content goes here -->
            <div class="content">
                {% block content %}{% endblock %}
            </div>

        </main>

    </div>

</body>
</html>
